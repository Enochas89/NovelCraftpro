name: Build macOS Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate mac icon (.icns)
        run: bash ./scripts/generate-mac-icon.sh

      - name: Build mac app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" ]]; then
            echo "Signed build enabled."
            export REQUIRE_MAC_NOTARIZATION=1
          else
            echo "No signing certificate provided. Building unsigned artifacts."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            export REQUIRE_MAC_NOTARIZATION=0
          fi
          npm run build:mac:${{ matrix.arch }}

      - name: Verify mac build
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: bash ./scripts/verify-mac-build.sh ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovelCraft-Pro-macOS-${{ matrix.arch }}
          path: |
            dist/*-mac-${{ matrix.arch }}.dmg
            dist/*-mac-${{ matrix.arch }}.zip
            dist/*-mac-${{ matrix.arch }}.dmg.blockmap
            dist/*-mac-${{ matrix.arch }}.zip.blockmap
          if-no-files-found: error
          retention-days: 14
